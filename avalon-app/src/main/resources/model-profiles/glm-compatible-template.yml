# Template only: this provider is routed through the shared OpenAI-compatible gateway.
# This template is pre-wired for OpenRouter. Replace modelName if you want a different GLM model.
modelId: glm-compatible-template
displayName: GLM via OpenRouter Template
provider: glm
modelName: z-ai/glm-4.5
temperature: 0.2
maxTokens: 320
enabled: false
providerOptions:
  apiKeyEnv: OPENROUTER_API_KEY
  baseUrl: https://openrouter.ai/api/v1
  response_format:
    type: json_object
