# Template only: this provider is routed through the shared OpenAI-compatible gateway.
# This template is pre-wired for OpenRouter. Replace modelName if you want a different Claude model.
modelId: claude-sonnet-4-6
displayName: Claude via OpenRouter Template
provider: claude
modelName: claude-sonnet-4-6
temperature: 0.2
maxTokens: 320
enabled: false
providerOptions:
  baseUrl: https://gcapi.cn/v1
  response_format:
    type: json_object
  avalonRuntime:
    profileId: claude-avalon-compact-v1
    admissionEligible: true
    promptCompressionLevel: high
    totCandidateCount: 2
    stageBudgets:
      belief-stage:
        maxTokens: 960
        timeoutMillis: 120000
        maxAttempts: 2
      tot-stage:
        maxTokens: 1120
        timeoutMillis: 120000
        maxAttempts: 2
      critic-stage:
        maxTokens: 760
        timeoutMillis: 120000
        maxAttempts: 2
      decision-stage:
        maxTokens: 640
        timeoutMillis: 120000
        maxAttempts: 2
