server:
  port: 8080

spring:
  datasource:
    url: jdbc:h2:mem:avalon;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
  flyway:
    enabled: true
  h2:
    console:
      enabled: true

avalon:
  app-name: Avalon AI
  console:
    enabled: false
